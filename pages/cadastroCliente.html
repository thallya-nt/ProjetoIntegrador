<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="../styling/cadCLientStyle.css" />
  </head>
  <body>
    <main class="container grad">
      <form class="formularioCliente">
        <h1>Cadastro de Cliente</h1>

        <!--NOME-->
        <div class="componentesForm">
          <label for="nomeC">Nome:</label>
          <input
            type="text"
            id="nomeC"
            placeholder="Digite o nome do cliente..."
          />
        </div>

        <!--TIPO DE CLIENTE-->
        <div class="componentesForm">
          <label for="opc">Tipo de cliente:</label>
          <select name="opcoes" id="opc">
            <option value="normal">Normal</option>
            <option value="socio">Sócio</option>
            <option value="familiar">Familiar</option>
          </select>
        </div>

        <!--EMAIL-->
        <div class="componentesForm">
          <label for="email">E-mail:</label>
          <input type="email" id="email" placeholder="Digite o email..." />
        </div>

        <!--REFERÊNCIA-->
        <div class="componentesForm">
          <label for="referencia">Referência: </label>
          <input
            type="text"
            id="ref"
            placeholder="Digite uma referência válida"
          />
        </div>

        <!--ENDEREÇO-->
        <div class="componentesForm">
          <label for="end">Endereço: </label>
          <input type="text" id="end" placeholder="Digite um endereço válido" />
        </div>

        <!--CONTATO-->
        <div class="componentesForm">
          <label for="contato">Contato: </label>
          <input type="text" id="cntt" placeholder="Digite um número válido" />
        </div>

        <div class="bt">
          <button type="submit" class="btCadastro">
            <strong>cadastrar</strong>
          </button>
        </div>
      </form>
      <p id="msg"></p>
    </main>
    <script src="../js/cadClients.js"></script>
  </body>
</html>
